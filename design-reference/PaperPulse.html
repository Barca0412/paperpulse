const seed = (function(){let s=2601; return ()=>{s=(s*9301+49297)%233280;return s/233280}})();

function makePapers() {
  const papers = [];
  const now = Date.now();
  for (let i = 0; i < 64; i++) {
    const daysAgo = Math.floor(seed() * 32);
    const d = new Date(now - daysAgo * 86400000);
    const titleIdx = i % TITLE_POOL.length;
    const authorSet = Array.from({length: 2 + Math.floor(seed()*3)}, () => AUTHORS[Math.floor(seed()*AUTHORS.length)]);
    const uniqAuths = Array.from(new Map(authorSet.map(a => [a.id, a])).values());
    const topicSet = Array.from(new Set([TOPICS[Math.floor(seed()*TOPICS.length)].slug, TOPICS[Math.floor(seed()*TOPICS.length)].slug])).slice(0,3);
    const relevance = +(3 + seed()*7).toFixed(1);
    const tier = relevance > 7.5 ? 'A' : relevance > 5.5 ? 'B' : 'C';
    const hasCode = seed() > 0.55;
    const hfDaily = seed() > 0.82;
    const trackedAuthor = uniqAuths.some(a => a.tracked);
    const sources = ['arxiv','ssrn','crossref','s2','hf'];
    papers.push({
      id: 'p' + i,
      title: TITLE_POOL[titleIdx],
      tldrEN: TLDR_EN[titleIdx],
      tldrZH: TLDR_ZH[titleIdx],
      authors: uniqAuths.map(a => ({ name: a.name, institutionId: a.institutionId, authorId: a.id })),
      date: d.toISOString(),
      tier,
      topics: topicSet,
      source: sources[Math.floor(seed()*sources.length)],
      venue: 'arXiv',
      arxivId: 'arXiv:260' + (4 + Math.floor(seed()*2)) + '.' + (10000 + Math.floor(seed()*9000)),
      relevance,
      citationsPerWeek: Math.floor(seed() * 30),
      hasCode,
      hfDaily,
      trackedAuthor,
      status: seed() > 0.9 ? 'saved' : seed() > 0.93 ? 'must_read' : 'unread',
      pdfUrl: '#',
    });
  }
  return papers.sort((a,b) => b.date.localeCompare(a.date));
}

function cn(...xs) { return xs.filter(Boolean).join(' '); }
function relativeDate(iso) {
  const diff = Math.round((Date.now() - new Date(iso).getTime()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  if (diff < 7) return diff + 'd ago';
  if (diff < 30) return Math.floor(diff/7) + 'w ago';
  return new Date(iso).toISOString().slice(0,10);
}
function shortDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function daysAway(iso) {
  return Math.round((new Date(iso).getTime() - Date.now()) / 86400000);
}

// ═════════════════════════════ APP SHELL ═════════════════════════════
function App() {
  const [route, setRoute] = useState('feed');
  const [dark, setDark] = useState(true);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [papers] = useState(() => makePapers());
  const [papersState, setPapersState] = useState(papers);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setCmdOpen(true); }
      if (e.key === 'Escape') setCmdOpen(false);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const setPaperStatus = (id, status) => setPapersState(s => s.map(p => p.id === id ? { ...p, status } : p));

  const pages = {
    feed: <Feed papers={papersState} setStatus={setPaperStatus} />,
    explore: <Explore papers={papersState} />,
    dashboard: <Dashboard papers={papersState} />,
    network: <Network papers={papersState} />,
    conferences: <Conferences />,
    digest: <Digest />,
    institutions: <Institutions />,
    authors: <Authors papers={papersState} />,
    settings: <Settings />,
  };

  return (
    <div className="h-full flex flex-col">
      <TopBar dark={dark} setDark={setDark} setCmdOpen={setCmdOpen} />
      <div className="flex flex-1 min-h-0">
        <SideNav route={route} setRoute={setRoute} />
        <main className="flex-1 min-w-0 overflow-hidden">
          {pages[route]}
        </main>
      </div>
      <StatusBar papers={papersState} />
      {cmdOpen && <CommandPalette onClose={() => setCmdOpen(false)} setRoute={(r) => { setRoute(r); setCmdOpen(false); }} papers={papersState} />}
    </div>
  );
}

function TopBar({ dark, setDark, setCmdOpen }) {
  return (
    <div className="h-11 shrink-0 border-b border-border flex items-center px-3 gap-3 bg-card/50 backdrop-blur">
      <div className="flex items-center gap-2">
        <div className="h-6 w-6 rounded-md bg-gradient-to-br from-rose-500 via-amber-500 to-sky-500 shadow-inner flex items-center justify-center">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <span className="font-semibold text-sm tracking-tight">PaperPulse</span>
        <span className="text-[10px] text-mutedfg font-mono px-1.5 py-0.5 rounded bg-muted border border-border">v0.8.3</span>
      </div>
      <button onClick={() => setCmdOpen(true)} className="ml-4 flex-1 max-w-xl h-7 rounded-md border border-border bg-muted hover:bg-accent px-2.5 flex items-center gap-2 text-xs text-mutedfg">
        <Icon.Search /> <span>Search papers, authors, institutions…</span>
        <span className="ml-auto text-[10px]"><kbd>⌘</kbd> <kbd>K</kbd></span>
      </button>
      <div className="ml-auto flex items-center gap-1.5">
        <Button size="sm" variant="ghost" title="Toggle dark mode" onClick={() => setDark(!dark)}>
          {dark ? <Icon.Sun /> : <Icon.Moon />}
        </Button>
        <Button size="sm" variant="ghost" title="Notifications">
          <Icon.Bell />
          <span className="ml-0.5 text-[9px] px-1 rounded-full bg-rose-500 text-white font-mono">3</span>
        </Button>
        <div className="w-7 h-7 rounded-full bg-gradient-to-br from-sky-500 to-violet-600 flex items-center justify-center text-white text-[11px] font-semibold">QF</div>
      </div>
    </div>
  );
}

function StatusBar({ papers }) {
  return (
    <div className="h-6 shrink-0 border-t border-border bg-card/60 flex items-center gap-4 px-3 text-[10px] font-mono text-mutedfg">
      <span className="flex items-center gap-1"><span className="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"/> All services up</span>
      <span>Last ingest · 12 min ago</span>
      <span>{papers.length} papers</span>
      <span className="ml-auto flex items-center gap-2">
        <span>Next digest · Mon 09:00 CST</span>
        <span>·</span>
        <span>LLM · claude-sonnet-4-5</span>
        <span>·</span>
        <span className="text-emerald-500">$42.81/mo</span>

}

// ═════════════════════════════ COMMAND PALETTE ═════════════════════════════
function CommandPalette({ onClose, setRoute, papers }) {
  const [q, setQ] = useState('');
  const items = [
    { section:'Quick actions', list:[
      { label:'Go to Feed', icon: Icon.Newspaper, fn:()=>setRoute('feed') },
      { label:'Go to Dashboard', icon: Icon.Bar, fn:()=>setRoute('dashboard') },
      { label:'Go to Settings', icon: Icon.Settings, fn:()=>setRoute('settings') },
      { label:'Run ingest now', icon: Icon.Refresh, fn:onClose },
      { label:'Generate weekly digest', icon: Icon.FileText, fn:onClose },
    ]},
    { section:'Recent papers', list: papers.slice(0,6).map(p => ({ label: p.title, icon: Icon.Search, fn: ()=>setRoute('feed') })) },
    { section:'Tracked authors', list: AUTHORS.filter(a => a.tracked).slice(0,5).map(a => ({ label: a.name, icon: Icon.Users, fn: ()=>setRoute('authors') })) },
  ];
  const filtered = items.map(s => ({ ...s, list: s.list.filter(i => !q || i.label.toLowerCase().includes(q.toLowerCase())) })).filter(s => s.list.length);
  return (
    <div className="fixed inset-0 z-50 bg-black/30 backdrop-blur-sm flex items-start justify-center pt-[15vh]" onClick={onClose}>
      <div className="w-full max-w-xl bg-card rounded-xl border border-border shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
        <div className="flex items-center gap-2 px-4 py-3 border-b border-border">
          <Icon.Search />
          <input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder="Search papers, authors, institutions…" className="flex-1 bg-transparent outline-none text-sm" />
          <kbd>Esc</kbd>
        </div>
        <div className="max-h-[400px] overflow-y-auto p-1">
          {filtered.length === 0 && <div className="p-8 text-center text-sm text-mutedfg">No results.</div>}
          {filtered.map(s => (
            <div key={s.section} className="p-1">
              <div className="text-[10px] uppercase tracking-wider font-semibold text-mutedfg px-2 py-1">{s.section}</div>
              {s.list.map((it, i) => (
                <button key={i} onClick={it.fn} className="w-full flex items-center gap-2 px-2 py-1.5 rounded hover:bg-accent text-xs text-left">
                  <it.icon /> <span className="truncate flex-1">{it.label}</span>
                </button>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════ FEED ═════════════════════════════
function Feed({ papers, setStatus }) {
  const [filters, setFilters] = useState({ tier: [], status: [], topics: [], institutions: [], hasCode: false, hfDaily: false, trackedAuthor: false, relevanceMin: 0, query: '' });
  const [sort, setSort] = useState('date_desc');
  const [selected, setSelected] = useState(null);
  const [expanded, setExpanded] = useState(new Set());
  const setF = (k, v) => setFilters(s => ({ ...s, [k]: v }));
  const resetF = () => setFilters({ tier: [], status: [], topics: [], institutions: [], hasCode: false, hfDaily: false, trackedAuthor: false, relevanceMin: 0, query: '' });

  const visible = useMemo(() => {
    let out = papers.slice();
    if (filters.tier.length) out = out.filter(p => filters.tier.includes(p.tier));
    if (filters.status.length) out = out.filter(p => filters.status.includes(p.status));
    if (filters.topics.length) out = out.filter(p => p.topics.some(t => filters.topics.includes(t)));
    if (filters.hasCode) out = out.filter(p => p.hasCode);
    if (filters.hfDaily) out = out.filter(p => p.hfDaily);
    if (filters.trackedAuthor) out = out.filter(p => p.trackedAuthor);
    if (filters.relevanceMin > 0) out = out.filter(p => p.relevance >= filters.relevanceMin);
    if (filters.query.trim()) {
      const q = filters.query.toLowerCase();
      out = out.filter(p => p.title.toLowerCase().includes(q) || p.tldrEN.toLowerCase().includes(q) || p.authors.some(a => a.name.toLowerCase().includes(q)));
    }
    if (sort === 'relevance') out.sort((a,b) => b.relevance - a.relevance);
    else if (sort === 'tier') out.sort((a,b) => a.tier.localeCompare(b.tier) || b.relevance - a.relevance);
    else out.sort((a,b) => b.date.localeCompare(a.date));
    return out;
  }, [papers, filters, sort]);

  const byDate = useMemo(() => {
    const g = {};
    for (const p of visible) { const d = p.date.slice(0,10); (g[d] ||= []).push(p); }
    return Object.entries(g).sort((a,b) => b[0].localeCompare(a[0]));
  }, [visible]);

  const activeCount = filters.tier.length + filters.status.length + filters.topics.length + (filters.hasCode?1:0) + (filters.hfDaily?1:0) + (filters.trackedAuthor?1:0) + (filters.relevanceMin>0?1:0);
  const dateHeader = (d) => {
    const date = new Date(d); const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((today - date) / 86400000);
    if (diff === 0) return 'Today · ' + d;
    if (diff === 1) return 'Yesterday · ' + d;
    if (diff < 7) return diff + ' days ago · ' + d;
    return new Date(d).toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
  };

  return (
    <div className="h-full flex overflow-hidden">
      {/* Filter rail */}
      <aside className="w-60 shrink-0 border-r border-border flex flex-col overflow-hidden">
        <div className="px-3 py-3 border-b border-border flex items-center gap-2">
          <h3 className="text-xs font-semibold">Filters</h3>
          {activeCount > 0 && <Badge variant="secondary">{activeCount}</Badge>}
          {activeCount > 0 && <Button size="sm" variant="ghost" className="ml-auto h-6 text-[10px]" onClick={resetF}>Clear</Button>}
        </div>
        <div className="flex-1 overflow-y-auto p-3 space-y-4">
          <FilterSection title="Tier">
            <div className="flex gap-1">
              {['A','B','C'].map(t => {
                const on = filters.tier.includes(t);
                return <button key={t} onClick={() => setF('tier', on ? filters.tier.filter(x=>x!==t) : [...filters.tier, t])}
                  className={cn('h-7 flex-1 rounded border font-mono text-xs', on ? 'bg-fg text-bg border-fg' : 'bg-card border-border hover:bg-accent')}>{t}</button>;
              })}
            </div>
          </FilterSection>
          <FilterSection title="Status">
            <div className="space-y-1">
              {['unread','saved','must_read','ignored'].map(s => (
                <label key={s} className="flex items-center gap-2 text-xs cursor-pointer">
                  <Checkbox checked={filters.status.includes(s)} onChange={() => setF('status', filters.status.includes(s) ? filters.status.filter(x=>x!==s) : [...filters.status, s])} />
                  <span className="capitalize">{s.replace('_', ' ')}</span>
                </label>
              ))}
            </div>
          </FilterSection>
          <FilterSection title="Relevance ≥">
            <div className="flex items-center gap-2">
              <Slider min={0} max={10} step={0.1} value={filters.relevanceMin} onChange={(v) => setF('relevanceMin', v)} />
              <span className="font-mono text-xs w-8 text-right">{filters.relevanceMin.toFixed(1)}</span>
            </div>
          </FilterSection>
          <FilterSection title="Signals">
            <div className="space-y-1">
              <label className="flex items-center gap-2 text-xs"><Checkbox checked={filters.hfDaily} onChange={v=>setF('hfDaily',v)} /> <span className="text-orange-500"><Icon.Flame /></span> HF Daily</label>
              <label className="flex items-center gap-2 text-xs"><Checkbox checked={filters.hasCode} onChange={v=>setF('hasCode',v)} /> <span className="text-emerald-500"><Icon.Code /></span> Has code</label>
              <label className="flex items-center gap-2 text-xs"><Checkbox checked={filters.trackedAuthor} onChange={v=>setF('trackedAuthor',v)} /> <span className="text-yellow-500"><Icon.UserCheck /></span> Tracked author</label>
            </div>
          </FilterSection>
          <FilterSection title="Topics">
            <div className="flex flex-wrap gap-1">
              {TOPICS.slice(0, 10).map(t => {
                const on = filters.topics.includes(t.slug);
                return <button key={t.slug} onClick={() => setF('topics', on ? filters.topics.filter(x=>x!==t.slug) : [...filters.topics, t.slug])}
                  className={cn('text-[10px] px-1.5 py-0.5 rounded-full border', on ? 'bg-fg text-bg border-fg' : 'bg-card border-border hover:bg-accent')}>{t.name}</button>;
              })}
            </div>
          </FilterSection>
        </div>
      </aside>

      {/* Feed list */}
      <div className="flex-1 flex flex-col overflow-hidden">
        <div className="px-6 py-3 border-b border-border flex items-center gap-3">
          <div className="relative w-96">
            <span className="absolute left-2 top-1/2 -translate-y-1/2 opacity-50"><Icon.Search /></span>
            <Input value={filters.query} onChange={e => setF('query', e.target.value)} placeholder="Search title, TL;DR, author…" className="pl-7 w-full" />
          </div>
          <div className="flex items-center gap-1.5 ml-2">
            <span className="text-[10px] uppercase tracking-wider text-mutedfg font-semibold">Quick:</span>
            {[
              { label:'Must read', fn:()=>setF('status',['must_read']) },
              { label:'Tier A', fn:()=>setF('tier',['A']) },
              { label:'With code', fn:()=>setF('hasCode',true) },
              { label:'Tracked', fn:()=>setF('trackedAuthor',true) },
            ].map(p => <Button key={p.label} size="sm" variant="outline" onClick={p.fn}>{p.label}</Button>)}
          </div>
          <div className="ml-auto flex items-center gap-2">
            <select value={sort} onChange={e => setSort(e.target.value)} className="h-7 rounded-md border border-border bg-card px-2 text-xs">
              <option value="date_desc">Newest first</option>
              <option value="relevance">Relevance</option>
              <option value="tier">Tier</option>
            </select>
            <span className="text-xs text-mutedfg font-mono">{visible.length} papers</span>
          </div>
        </div>
        <div className="flex-1 overflow-y-auto">
          {byDate.length === 0 ? (
            <div className="flex flex-col items-center justify-center py-24 text-center">
              <div className="h-12 w-12 rounded-full bg-muted flex items-center justify-center mb-3"><Icon.Search s={20} /></div>
              <h3 className="font-semibold">No papers match your filters</h3>
              <p className="text-xs text-mutedfg mt-1">Try loosening a filter, or <button className="underline" onClick={resetF}>clear all</button>.</p>
            </div>
          ) : (
            <div className="px-6 py-4">
              {byDate.map(([date, ps]) => (
                <div key={date} className="mb-6">
                  <div className="flex items-baseline gap-3 mb-2 sticky top-0 z-10 bg-bg py-1.5">
                    <h3 className="text-sm font-semibold flex items-center gap-2"><span className="text-mutedfg"><Icon.Calendar /></span>{dateHeader(date)}</h3>
                    <span className="text-[11px] text-mutedfg font-mono">{ps.length} papers</span>
                  </div>
                  <div className="space-y-2">
                    {ps.map(p => (
                      <PaperCard key={p.id} paper={p} selected={selected === p.id} expanded={expanded.has(p.id)}
                        onSelect={() => setSelected(p.id)}
                        onToggleExpand={() => setExpanded(s => { const n = new Set(s); n.has(p.id) ? n.delete(p.id) : n.add(p.id); return n; })}
                        setStatus={setStatus} />
                    ))}
                  </div>
                </div>
              ))}
              <div className="text-center py-6 text-xs text-mutedfg"><kbd>j</kbd>/<kbd>k</kbd> navigate · <kbd>o</kbd> open · <kbd>s</kbd> save</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function FilterSection({ title, children }) {
  return <div><div className="text-[10px] uppercase tracking-wider font-semibold text-mutedfg mb-1.5">{title}</div>{children}</div>;
}

function PaperCard({ paper, selected, expanded, onSelect, onToggleExpand, setStatus }) {
  const tierVariant = { A:'tierA', B:'tierB', C:'tierC' };
  const insts = Array.from(new Set(paper.authors.map(a => INST_BY_ID[a.institutionId]?.short).filter(Boolean)));
  const shownAuthors = paper.authors.slice(0, 3);
  const extraAuthors = paper.authors.length - shownAuthors.length;
  const isSaved = paper.status === 'saved';
  const isMust = paper.status === 'must_read';
  const isIgnored = paper.status === 'ignored';

  return (
    <article onClick={onSelect}
      className={cn('group relative rounded-lg border bg-card px-4 py-3 transition-all hover:shadow-sm hover:border-fg/20 cursor-pointer',
        selected && 'ring-1 ring-fg/40 border-fg/40',
        isMust && 'border-l-[3px] border-l-rose-500',
        isIgnored && 'opacity-40')}>
      <div className="flex items-center gap-1.5 mb-1.5 text-[11px] text-mutedfg">
        <Badge variant={tierVariant[paper.tier]} className="font-mono">{paper.tier}</Badge>
        {paper.topics.slice(0, 3).map(slug => {
          const t = TOPIC_BY_SLUG[slug];
          return t ? <Badge key={slug} variant={t.side}>{t.name}</Badge> : null;
        })}
        <span className="ml-auto font-mono">{relativeDate(paper.date)}</span>
        {isSaved && <span className="text-sky-500"><Icon.BookmarkCheck /></span>}
      </div>
      <h3 className="text-[15px] font-semibold leading-snug">{paper.title}</h3>
      <div className="flex flex-wrap items-center gap-x-2 gap-y-0.5 mt-1 text-xs text-mutedfg">
        <span>{shownAuthors.map(a => a.name).join(', ')}{extraAuthors > 0 && <span className="italic"> et al.</span>}</span>
        <span className="opacity-40">·</span>
        <span className="text-fg/70">{insts.join(' · ')}</span>
        <span className="opacity-40">·</span>
        <span className="font-mono text-[10px]">{paper.arxivId}</span>
      </div>
      <p className="mt-2 text-[13px] leading-relaxed text-fg/85">{paper.tldrEN}</p>
      <p className="mt-1 text-[12px] leading-relaxed text-mutedfg zh">{paper.tldrZH}</p>
      <div className="mt-2 flex flex-wrap items-center gap-3 text-[11px] text-mutedfg">
        <span className="flex items-center gap-1"><span className="text-amber-500"><Icon.Star s={12} /></span><span className="font-mono font-medium text-fg/80">{paper.relevance.toFixed(1)}</span></span>
        {paper.citationsPerWeek > 0 && <span className="flex items-center gap-1"><span className="text-purple-500"><Icon.Trend s={12} /></span><span className="font-mono">{paper.citationsPerWeek} cites/7d</span></span>}
        {paper.hasCode && <span className="flex items-center gap-1 text-emerald-500"><Icon.Code s={12} />code</span>}
        {paper.hfDaily && <span className="flex items-center gap-1 text-orange-500"><Icon.Flame s={12} />HF Daily</span>}
        {paper.trackedAuthor && <span className="flex items-center gap-1 text-yellow-500"><Icon.UserCheck s={12} />tracked</span>}
        <span className="ml-auto uppercase text-[10px] tracking-wider font-mono opacity-60">{paper.source}</span>
      </div>
      {expanded && (
        <div className="mt-3 pt-3 border-t border-border space-y-2.5">
          <div>
            <div className="text-[10px] uppercase tracking-wider font-semibold text-mutedfg mb-1">Abstract</div>
            <p className="text-xs leading-relaxed text-fg/85">{paper.tldrEN} {paper.tldrEN} The method decouples valuation from execution, which is unusual; it also makes the whole pipeline easy to audit.</p>
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wider font-semibold text-mutedfg mb-1">My score</div>
            <div className="flex items-center gap-3"><Slider min={0} max={10} step={0.1} value={paper.relevance} onChange={()=>{}} /><span className="font-mono text-sm w-10 text-right">{paper.relevance.toFixed(1)}</span></div>
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wider font-semibold text-mutedfg mb-1">Notes</div>
            <Textarea rows={2} placeholder="Your private notes…" />
          </div>
        </div>
      )}
      <div className="mt-3 flex items-center gap-1.5" onClick={e => e.stopPropagation()}>
        <Button size="sm" variant={isSaved ? 'secondary' : 'outline'} onClick={() => setStatus(paper.id, isSaved ? 'unread' : 'saved')}>
          <Icon.Bookmark /> {isSaved ? 'Saved' : 'Save'}
        </Button>
        <Button size="sm" variant={isMust ? 'secondary' : 'outline'} onClick={() => setStatus(paper.id, isMust ? 'unread' : 'must_read')} className={isMust ? 'text-rose-500' : ''}>
          <Icon.AlertCircle /> Must read
        </Button>
        <Button size="sm" variant={isIgnored ? 'secondary' : 'ghost'} onClick={() => setStatus(paper.id, isIgnored ? 'unread' : 'ignored')}>
          <Icon.X /> Ignore
        </Button>
        <Button size="sm" variant="ghost"><Icon.ExternalLink /> PDF</Button>
        <Button size="sm" variant="ghost" className="ml-auto" onClick={onToggleExpand}>
          <Icon.ChevronDown className={cn('transition-transform', expanded && 'rotate-180')} /> {expanded ? 'Collapse' : 'Expand'}
        </Button>
      </div>
    </article>
  );
}

// ═════════════════════════════ DASHBOARD ═════════════════════════════
function Dashboard({ papers }) {
  const [win, setWin] = useState('30d');
  const WIN_DAYS = { '7d':7, '30d':30, '90d':90, 'all':365 };
  const filtered = papers.filter(p => Date.now() - new Date(p.date).getTime() < WIN_DAYS[win]*86400000);
  const today = new Date().toDateString();
  const newToday = papers.filter(p => new Date(p.date).toDateString() === today).length;
  const thisWeek = papers.filter(p => Date.now() - new Date(p.date).getTime() < 7*86400000).length;
  const mustRead = papers.filter(p => p.status === 'must_read').length;

  const trend = useMemo(() => {
    const days = {};
    for (const p of filtered) { const d = p.date.slice(5,10); days[d] ||= {date:d,A:0,B:0,C:0}; days[d][p.tier]++; }
    return Object.values(days).sort((a,b) => a.date.localeCompare(b.date));
  }, [filtered]);

  const topicData = useMemo(() => {
    const buckets = {};
    for (const p of filtered) { const w = p.date.slice(5,10); buckets[w] ||= {week:w}; for (const t of p.topics.slice(0,1)) buckets[w][t] = (buckets[w][t]||0)+1; }
    return Object.values(buckets).sort((a,b) => a.week.localeCompare(b.week));
  }, [filtered]);
  const topTopics = useMemo(() => {
    const c = {}; for (const p of filtered) for (const t of p.topics) c[t] = (c[t]||0)+1;
    return Object.entries(c).sort((a,b) => b[1]-a[1]).slice(0,5).map(([s])=>s);
  }, [filtered]);

  const tierData = ['A','B','C'].map(t => ({ name:`Tier ${t}`, value: filtered.filter(p=>p.tier===t).length, color: t==='A'?'#10b981':t==='B'?'#0ea5e9':'#94a3b8' }));

  const instData = useMemo(() => {
    const c = {}; for (const p of filtered) for (const a of p.authors) c[a.institutionId] = (c[a.institutionId]||0)+1;
    return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([id,count]) => ({ name: INST_BY_ID[id]?.short || id, count, whitelisted: INST_BY_ID[id]?.whitelisted }));
  }, [filtered]);

  const authData = useMemo(() => {
    const c = {}; for (const p of filtered) for (const a of p.authors) if (a.authorId) c[a.authorId] = (c[a.authorId]||0)+1;
    return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([id,count]) => ({ name: AUTHOR_BY_ID[id]?.name||id, count, tracked: AUTHOR_BY_ID[id]?.tracked }));
  }, [filtered]);

  const TC = ['#0ea5e9','#10b981','#f59e0b','#8b5cf6','#14b8a6'];
  const tt = { fontSize: 11, padding: 6, background: 'rgb(var(--card))', border: '1px solid rgb(var(--border))', borderRadius: 4 };

  return (
    <div className="h-full overflow-y-auto">
      <div className="px-6 py-4 border-b border-border flex items-center gap-3">
        <div>
          <h1 className="text-xl font-bold tracking-tight">Dashboard</h1>
          <p className="text-xs text-mutedfg mt-0.5">{new Date().toLocaleDateString(undefined, {weekday:'long', month:'long', day:'numeric', year:'numeric'})}</p>
        </div>
        <div className="ml-auto flex gap-1">
          {['7d','30d','90d','all'].map(w => (
            <button key={w} onClick={() => setWin(w)} className={cn('px-2.5 h-7 rounded text-xs font-mono border', win===w ? 'bg-fg text-bg border-fg' : 'border-border hover:bg-accent')}>{w}</button>
          ))}
        </div>
      </div>

      <div className="p-6 grid grid-cols-2 gap-4">
        <Card className="p-4">
          <div className="text-sm font-semibold">Today's Numbers</div>
          <div className="grid grid-cols-4 gap-4 mt-4">
            <Kpi label="New today" value={newToday} delta={+9} />
            <Kpi label="This week" value={thisWeek} delta={+12} />
            <Kpi label={`Last ${WIN_DAYS[win]}d`} value={filtered.length} delta={+4} />
            <Kpi label="Must read" value={mustRead} delta={+3} tone="rose" />
          </div>
          <div className="mt-5 pt-4 border-t border-border text-xs text-mutedfg">
            <div className="mb-2">Ingestion trend — stacked by tier</div>
            <div className="h-28">
              <ResponsiveContainer>
                <AreaChart data={trend}>
                  <CartesianGrid strokeDasharray="2 4" stroke="rgb(var(--border))" />
                  <XAxis dataKey="date" fontSize={9} stroke="rgb(var(--muted-fg))" />
                  <YAxis fontSize={9} stroke="rgb(var(--muted-fg))" width={20} />
                  <Tooltip contentStyle={tt} />
                  <Area dataKey="A" stackId="1" stroke="#10b981" fill="#10b981" fillOpacity={0.35} />
                  <Area dataKey="B" stackId="1" stroke="#0ea5e9" fill="#0ea5e9" fillOpacity={0.35} />
                  <Area dataKey="C" stackId="1" stroke="#94a3b8" fill="#94a3b8" fillOpacity={0.35} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          </div>
        </Card>

        <Card className="p-4">
          <div className="text-sm font-semibold">Topic Heat Trend</div>
          <div className="text-xs text-mutedfg mt-0.5 mb-2">Top 5 topics · papers per day</div>
          <div className="h-48">
            <ResponsiveContainer>
              <LineChart data={topicData}>
                <CartesianGrid strokeDasharray="2 4" stroke="rgb(var(--border))" />
                <XAxis dataKey="week" fontSize={9} stroke="rgb(var(--muted-fg))" />
                <YAxis fontSize={9} stroke="rgb(var(--muted-fg))" width={20} />
                <Tooltip contentStyle={tt} />
                {topTopics.map((t,i) => <Line key={t} dataKey={t} stroke={TC[i]} name={TOPIC_BY_SLUG[t]?.name} strokeWidth={1.6} dot={false} />)}
              </LineChart>
            </ResponsiveContainer>
          </div>
          <div className="flex flex-wrap gap-1 mt-2">
            {topTopics.map((t,i) => <span key={t} className="text-[10px] flex items-center gap-1"><span className="h-1.5 w-2 rounded-sm" style={{background:TC[i]}}/>{TOPIC_BY_SLUG[t]?.name}</span>)}
          </div>
        </Card>

        <Card className="p-4">
          <div className="text-sm font-semibold">Tier Distribution</div>
          <div className="text-xs text-mutedfg mt-0.5 mb-2">How papers break down A / B / C</div>
          <div className="h-48">
            <ResponsiveContainer>
              <PieChart>
                <Pie data={tierData} dataKey="value" innerRadius={40} outerRadius={70} paddingAngle={2}>
                  {tierData.map((d,i) => <Cell key={i} fill={d.color} />)}
                </Pie>
                <Legend wrapperStyle={{fontSize:11}} />
                <Tooltip contentStyle={tt} />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </Card>

        <Card className="p-4">
          <div className="text-sm font-semibold">Top Institutions</div>
          <div className="text-xs text-mutedfg mt-0.5 mb-2">Whitelisted highlighted · {win} window</div>
          <div className="h-56">
            <ResponsiveContainer>
              <BarChart data={instData} layout="vertical" margin={{left:50}}>
                <CartesianGrid strokeDasharray="2 4" stroke="rgb(var(--border))" />
                <XAxis type="number" fontSize={9} stroke="rgb(var(--muted-fg))" />
                <YAxis type="category" dataKey="name" fontSize={9} width={70} stroke="rgb(var(--muted-fg))" />
                <Tooltip contentStyle={tt} />
                <Bar dataKey="count">{instData.map((d,i) => <Cell key={i} fill={d.whitelisted ? '#10b981' : '#64748b'} />)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </Card>

        <Card className="p-4">
          <div className="text-sm font-semibold">Top Authors</div>
          <div className="text-xs text-mutedfg mt-0.5 mb-2">Tracked authors highlighted</div>
          <div className="h-56">
            <ResponsiveContainer>
              <BarChart data={authData} layout="vertical" margin={{left:60}}>
                <CartesianGrid strokeDasharray="2 4" stroke="rgb(var(--border))" />
                <XAxis type="number" fontSize={9} stroke="rgb(var(--muted-fg))" />
                <YAxis type="category" dataKey="name" fontSize={9} width={90} stroke="rgb(var(--muted-fg))" />
                <Tooltip contentStyle={tt} />
                <Bar dataKey="count">{authData.map((d,i) => <Cell key={i} fill={d.tracked ? '#f59e0b' : '#64748b'} />)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </Card>

        <Card className="p-4">
          <div className="text-sm font-semibold">Recent Digest teaser</div>
          <div className="text-xs text-mutedfg mt-0.5 mb-2">2026 W17 · Top 5 picks</div>
          <div className="text-xs space-y-2">
            {papers.filter(p => p.tier === 'A').slice(0, 5).map(p => (
              <div key={p.id} className="flex items-start gap-2 border-b border-border pb-2 last:border-0">
                <Badge variant="tierA" className="font-mono mt-0.5">A</Badge>
                <div className="min-w-0 flex-1">
                  <div className="font-medium leading-tight line-clamp-2">{p.title}</div>
                  <div className="text-mutedfg text-[10px] mt-0.5 truncate">{p.authors.slice(0,2).map(a => a.name).join(', ')}</div>
                </div>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}
function Kpi({ label, value, delta, tone }) {
  return <div>
    <div className="text-[10px] uppercase tracking-wider text-mutedfg font-semibold">{label}</div>
    <div className="flex items-baseline gap-2 mt-1">
      <span className={cn('text-2xl font-bold tabular-nums', tone === 'rose' && 'text-rose-500')}>{value}</span>
      <span className={cn('text-[11px] font-mono', delta >= 0 ? 'text-emerald-500' : 'text-rose-500')}>{delta >= 0 ? '+' : ''}{delta}</span>
    </div>
  </div>;
}

// ═════════════════════════════ NETWORK ═════════════════════════════
function Network({ papers }) {
  const [center, setCenter] = useState('a1');
  const [hops, setHops] = useState(2);
  const centerAuthor = AUTHOR_BY_ID[center];
  // Deterministic layout: place nodes in rings
  const nodes = useMemo(() => {
    const hop1 = AUTHORS.filter(a => a.id !== center).slice(0, 6);
    const hop2 = AUTHORS.filter(a => a.id !== center && !hop1.includes(a)).slice(0, 8);
    const W = 600, H = 440;
    const out = [{ ...centerAuthor, group:'center', x:W/2, y:H/2 }];
    hop1.forEach((a,i) => {
      const ang = (i / hop1.length) * Math.PI * 2;
      out.push({ ...a, group:'hop1', x: W/2 + Math.cos(ang)*130, y: H/2 + Math.sin(ang)*110 });
    });
    if (hops >= 2) hop2.forEach((a,i) => {
      const ang = (i / hop2.length) * Math.PI * 2 + 0.3;
      out.push({ ...a, group:'hop2', x: W/2 + Math.cos(ang)*210, y: H/2 + Math.sin(ang)*180 });
    });
    return out;
  }, [center, hops]);
  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));
  const links = useMemo(() => {
    const out = [];
    for (const n of nodes) if (n.group === 'hop1') out.push([center, n.id]);
    if (hops >= 2) for (const n of nodes) if (n.group === 'hop2') {
      const h1 = nodes.filter(x => x.group === 'hop1');
      const target = h1[Math.floor(((n.x*n.y) % h1.length + h1.length) % h1.length)];
      if (target) out.push([target.id, n.id]);
    }
    return out;
  }, [nodes, center, hops]);
  const [selNode, setSelNode] = useState(null);
  return (
    <div className="h-full flex flex-col overflow-hidden">
      <div className="px-6 py-4 border-b border-border">
        <h1 className="text-xl font-bold tracking-tight">Network</h1>
        <p className="text-xs text-mutedfg mt-0.5">Ego-network of an author across recent co-authorship.</p>
      </div>
      <div className="px-6 py-3 border-b border-border bg-muted/20 flex items-center gap-3 flex-wrap">
        <select value={center} onChange={e => setCenter(e.target.value)} className="h-7 rounded border border-border bg-card px-2 text-xs">
          {AUTHORS.map(a => <option key={a.id} value={a.id}>{a.name} — {INST_BY_ID[a.institutionId]?.short}</option>)}
        </select>

function renderMarkdown(src) {
  const out = []; const lines = src.split('\n'); let buf = [];
  const inline = s => s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  const flush = () => {
    if (!buf.length) return;
    const isList = buf.every(l => /^\d+\.\s|^\-\s/.test(l));
    if (isList) {
      const ordered = /^\d+\./.test(buf[0]);
      out.push(ordered ? <ol key={out.length}>{buf.map((l,i)=><li key={i} dangerouslySetInnerHTML={{__html: inline(l.replace(/^(\d+\.|\-)\s/,''))}} />)}</ol>
                       : <ul key={out.length}>{buf.map((l,i)=><li key={i} dangerouslySetInnerHTML={{__html: inline(l.replace(/^(\d+\.|\-)\s/,''))}} />)}</ul>);
    } else out.push(<p key={out.length} dangerouslySetInnerHTML={{__html: inline(buf.join(' '))}} />);
    buf = [];
  };
  for (const line of lines) {
    if (/^#\s/.test(line)) { flush(); out.push(<h1 key={out.length}>{line.replace(/^#\s/,'')}</h1>); }
    else if (/^##\s/.test(line)) { flush(); out.push(<h2 key={out.length}>{line.replace(/^##\s/,'')}</h2>); }
    else if (/^###\s/.test(line)) { flush(); out.push(<h3 key={out.length}>{line.replace(/^###\s/,'')}</h3>); }
    else if (!line.trim()) flush();
    else buf.push(line);
  }
  flush();
  return out;
}

        <div className="text-mutedfg">Last check</div><div className="font-mono">3h ago · up to date</div>
      </div>
      <div className="flex gap-2 mt-3"><Button size="sm" variant="outline">Check for updates</Button><Button size="sm" variant="outline"><Icon.ExternalLink /> Changelog</Button><Button size="sm" variant="outline"><Icon.ExternalLink /> GitHub</Button></div>
    </SCard>
    <SCard title="Keyboard shortcuts">
      <div className="grid grid-cols-2 gap-x-6 gap-y-1 text-xs">
        {[['⌘K','Command palette'],['j / k','Next / prev paper'],['o','Open expanded view'],['s','Save'],['m','Mark must-read'],['i','Ignore'],['g f','Go to Feed'],['g d','Go to Dashboard'],['g e','Go to Explore'],['⌘⇧D','Toggle dark mode'],['?','Show all shortcuts'],['Esc','Dismiss dialog']].map(([k,v]) => (
          <div key={k} className="flex justify-between py-0.5"><span className="text-mutedfg">{v}</span><kbd>{k}</kbd></div>
        ))}
      </div>
    </SCard>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
